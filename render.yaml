services:
  - type: web
    name: zss-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "waitress-serve --port=$PORT run:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: zss-db
    databaseName: zss_database
    user: zss_user